name: "Build iOS app"

# on: [push]
on: [workflow_dispatch]

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: build archive and ipaify
        run: |
          wget -O archive.zip "https://www.dropbox.com/scl/fi/cyq2ndy63at76slzylbdw/iosbuildstuff.zip?rlkey=pkv2qau5qnh2dpqw6sq9uca4e&st=kgohqt2l&dl=1"
          unzip archive.zip -d .

          cd iosbuildstuff/

          xcodebuild archive -project "ucg-mobile.xcodeproj" -scheme 'ucg-mobile' -archivePath "ucg-mobile.xcarchive" -configuration Release CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

          mkdir Payload
          mv "ucg-mobile.xcarchive/Products/Applications/ucg-mobile.app" Payload/uncannycatgolf.app

          zip -r "Uncanny Cat Golf.ipa" "Payload"

          mv "Uncanny Cat Golf.ipa" ${{ runner.temp }}/uncannycatgolf.ipa


      - name: Upload application
        uses: actions/upload-artifact@v4
        with:
          name: uncannycatgolf
          path: ${{ runner.temp }}/uncannycatgolf.ipa
          # you can also archive the entire directory
          # path: ${{ runner.temp }}/build
          retention-days: 3
